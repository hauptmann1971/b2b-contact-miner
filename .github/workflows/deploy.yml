name: Deploy To Server

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch/tag/sha)"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy code and sync .env
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_REF: ${{ github.event.inputs.ref || 'main' }}
          APP_DIR: ${{ secrets.APP_DIR }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SERP_API_PROVIDER: ${{ secrets.SERP_API_PROVIDER }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          USE_OPENAI: ${{ secrets.USE_OPENAI }}
          USE_DEEPSEEK: ${{ secrets.USE_DEEPSEEK }}
          USE_YANDEXGPT: ${{ secrets.USE_YANDEXGPT }}
          YANDEX_OAUTH_TOKEN: ${{ secrets.YANDEX_OAUTH_TOKEN }}
          YANDEX_FOLDER_ID: ${{ secrets.YANDEX_FOLDER_ID }}
          LLM_DATA_API_TOKEN: ${{ secrets.LLM_DATA_API_TOKEN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DEPLOY_REF,APP_DIR,DATABASE_URL,REDIS_URL,SERP_API_PROVIDER,SERPAPI_KEY,OPENAI_API_KEY,DEEPSEEK_API_KEY,USE_OPENAI,USE_DEEPSEEK,USE_YANDEXGPT,YANDEX_OAUTH_TOKEN,YANDEX_FOLDER_ID,LLM_DATA_API_TOKEN,ADMIN_USERNAME,ADMIN_PASSWORD,SECRET_KEY
          script_stop: true
          script: |
            set -e
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              echo "Repository is not initialized in APP_DIR: $APP_DIR"
              exit 1
            fi

            git fetch --all --prune
            git checkout "$DEPLOY_REF"
            git reset --hard "origin/$DEPLOY_REF" || true
            git pull --ff-only origin "$DEPLOY_REF" || true

            cat > .env <<EOF
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            SERP_API_PROVIDER=${SERP_API_PROVIDER}
            SERPAPI_KEY=${SERPAPI_KEY}
            OPENAI_API_KEY=${OPENAI_API_KEY}
            DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
            USE_OPENAI=${USE_OPENAI}
            USE_DEEPSEEK=${USE_DEEPSEEK}
            USE_YANDEXGPT=${USE_YANDEXGPT}
            YANDEX_OAUTH_TOKEN=${YANDEX_OAUTH_TOKEN}
            YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
            AUTO_REFRESH_YANDEX_IAM_BEFORE_RUN=true
            PERSIST_REFRESHED_YANDEX_IAM_TO_ENV=true
            ENFORCE_LLM_READY=true
            LLM_HEALTHCHECK_BEFORE_RUN=true
            LLM_HEALTHCHECK_TIMEOUT_SECONDS=10
            USE_LLM_EXTRACTION=true
            LLM_DATA_API_TOKEN=${LLM_DATA_API_TOKEN}
            ADMIN_USERNAME=${ADMIN_USERNAME}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            SECRET_KEY=${SECRET_KEY}
            EOF

            echo "Deployment finished. .env has been synchronized from GitHub Secrets."
