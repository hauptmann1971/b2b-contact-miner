# SonarQube Project Configuration
# ================================
# For SonarCloud integration

# Project identification
sonar.projectKey=hauptmann1971_b2b-contact-miner
sonar.organization=hauptmann1971
sonar.projectName=B2B Contact Miner
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.exclusions=**/venv/**,**/__pycache__/**,**/tests/**,**/migrations/**,**/*.md,**/doc/**,**/logs/**,**/.git/**

# Test configuration
sonar.tests=tests/
sonar.test.inclusions=**/test_*.py,**/*_test.py
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Language
sonar.language=py
sonar.sourceEncoding=UTF-8

# Python specific
sonar.python.version=3.10,3.11,3.12

# SCM
sonar.scm.provider=git

# Quality gate timeout
sonar.qualitygate.wait=true

# Clean as You Code - check only new/changed code
sonar.newCode.referenceBranch=main

# Server connection (SonarCloud)
# Note: SONAR_TOKEN must be set in GitHub Secrets or environment
sonar.host.url=https://sonarcloud.io
